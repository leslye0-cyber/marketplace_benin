<!-- templates/users/inscription_vendeur.html -->
{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Devenir Vendeur — MarketPlace Bénin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">
                    <i class="fas fa-store text-orange"></i> Créer votre boutique
                </h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-orange w-100 mt-3">
                        Créer ma boutique
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Déjà un compte ?
                    <a href="{% url 'connexion' %}">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
